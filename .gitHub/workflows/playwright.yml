name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    timeout-minutes: 90
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: --bind_ip_all
        # Данные сохраняются в контейнере, полностью изолированная база

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies for backend, frontend, tests
      - name: Install dependencies
        run: npm run install-all

      # 4. Install Playwright browsers
      - name: Install Playwright browsers
        working-directory: ./tests
        run: npx playwright install --with-deps

      # 5. Start backend + frontend
      - name: Start backend and frontend
        run: |
          cd backend && npm run start &
          cd ../frontend && npm run start &
        env:
          MONGOOSE_CONNECTION_STRING: mongodb://localhost:27017/productDB
          SECRET_KEY: supersecret
          NODE_ENV: test

      # 6. Wait until backend is ready
      - name: Wait for backend
        uses: iFaxity/wait-on-action@v1.2.1
        with:
          resource: http://localhost:2000

      # 7. Run Playwright tests
      - name: Run Playwright tests
        working-directory: ./tests
        env:
          BASE_UI_URL: http://localhost:3000
          BASE_API_URL: http://localhost:2000
          MONGOOSE_CONNECTION_STRING: mongodb://localhost:27017/productDB
        run: npx playwright test --reporter=list,html,junit

      # 8. Upload HTML report
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: tests/playwright-report
          retention-days: 30

      # 9. Upload JUnit report
      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: tests/results/junit.xml
          retention-days: 30

      # 10. Upload screenshots, videos, traces
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: tests/test-results
          retention-days: 30
